# Guards against an accidental major version bump of `guppylang` in a release PR.
#
# While the language is in its alpha phase we never want to silently jump major
# versions (which would also reset the guppylang-internals build counter). This
# fails the release PR if the guppylang major version increases relative to
# `main`, unless the `X-allow-major-bump` label is explicitly applied.

name: Release major-bump guard 🛑

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  guard:
    name: Disallow unapproved major bump
    runs-on: ubuntu-latest
    # Only relevant for the automated release PR.
    if: startsWith(github.head_ref, 'release-pr')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compare guppylang major versions
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          major() { sed -n 's/^version = "\([0-9][0-9]*\)\..*/\1/p' "$1" | head -n1; }

          head_major=$(major guppylang/pyproject.toml)
          git fetch origin "$BASE_REF" --depth=1
          git show "origin/$BASE_REF:guppylang/pyproject.toml" > /tmp/base_pyproject.toml
          base_major=$(major /tmp/base_pyproject.toml)

          echo "guppylang major version: base=$base_major head=$head_major"
          if [ "$head_major" -gt "$base_major" ]; then
            if echo "$LABELS" | jq -e 'index("X-allow-major-bump")' >/dev/null; then
              echo "Major bump permitted by the 'X-allow-major-bump' label."
            else
              echo "::error::guppylang major version would bump $base_major → $head_major. Add the 'X-allow-major-bump' label to allow this release."
              exit 1
            fi
          else
            echo "No major bump detected."
          fi

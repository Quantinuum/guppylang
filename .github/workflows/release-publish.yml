# Tags and publishes GitHub releases once a release PR is merged into `main`.
#
# On every push to `main` this checks whether the committed package versions are
# already tagged. If not (i.e. a release PR was just merged), it creates the tag
# and a GitHub release for each package, using release notes sliced verbatim from
# the committed CHANGELOG.md files. Creating the release triggers
# `python-wheels.yml`, which publishes the wheels to PyPI.

name: Release publish 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.HUGRBOT_PAT }}

jobs:
  publish:
    name: Tag and create GitHub releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.HUGRBOT_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "hugrbot"
          git config user.email "hugrbot@users.noreply.github.com"
      - name: Create releases for newly versioned packages
        run: |
          set -euo pipefail
          read_version() { sed -n 's/^version = "\(.*\)"/\1/p' "$1" | head -n1; }

          release_pkg() {
            local name="$1" pyproject="$2" changelog="$3" prefix="$4"
            local version tag
            version=$(read_version "$pyproject")
            tag="${prefix}${version}"

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "$tag already exists; nothing to publish for $name."
              return
            fi

            echo "Publishing $name $version as tag $tag"
            if ! python3 scripts/release/extract_changelog.py "$changelog" "$version" > /tmp/notes.md; then
              echo "No changelog section for $version; publishing with empty notes." >&2
              : > /tmp/notes.md
            fi

            git tag "$tag"
            git push origin "$tag"

            local args=(--title "$name $version" --notes-file /tmp/notes.md --verify-tag)
            # PEP 440 pre-releases carry a '-' separator (e.g. 1.0.0-a6, 1.0.0-rc1).
            case "$version" in
              *-*) args+=(--prerelease) ;;
            esac
            gh release create "$tag" "${args[@]}"
          }

          release_pkg "guppylang" \
            "guppylang/pyproject.toml" "guppylang/CHANGELOG.md" "guppylang-v"
          release_pkg "guppylang-internals" \
            "guppylang-internals/pyproject.toml" "guppylang-internals/CHANGELOG.md" \
            "guppylang-internals-v"

# Guards a release PR against an unintended version escalation:
#   * On `main`: blocks an accidental `guppylang` *major* version bump.
#   * On a `release/<major>.<minor>` branch: the minor is frozen, so blocks any
#     change to the major *or* minor (only patches/pre-releases are allowed).
#
# Add the `X-allow-major-bump` label to the release PR to opt out of this guard.

name: 🚚 Release version-bump guard

on:
  pull_request:
    branches:
      - main
      - "release/**"
      # TEMP test (remove before merge): guard the test release PR on this dev branch.
      - mr/chore/release-workflow-yet-again
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

env:
  ALLOW_MAJOR_BUMP_LABEL: "X-allow-major-bump"

jobs:
  guard:
    name: Disallow unapproved version escalation
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release-pr--')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare guppylang versions
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          major() { sed -n 's/^version = "\([0-9][0-9]*\)\..*/\1/p' "$1" | head -n1; }
          series() {
            sed -n 's/^version = "\([0-9][0-9]*\.[0-9][0-9]*\)\..*/\1/p' "$1" | head -n1
          }
          allowed() {
            echo "$LABELS" | jq -e --arg l "$ALLOW_MAJOR_BUMP_LABEL" 'index($l)' >/dev/null
          }

          git fetch origin "$BASE_REF" --depth=1
          git show "origin/$BASE_REF:guppylang/pyproject.toml" > /tmp/base_pyproject.toml

          case "$BASE_REF" in
            release/*)
              # The minor is frozen on a release branch: major.minor must not move.
              base_series=$(series /tmp/base_pyproject.toml)
              head_series=$(series guppylang/pyproject.toml)
              echo "guppylang release line: base=$base_series head=$head_series"
              if [ "$head_series" != "$base_series" ]; then
                if allowed; then
                  echo "Frozen-line change permitted by the '$ALLOW_MAJOR_BUMP_LABEL' label."
                else
                  echo "::error::$BASE_REF is frozen to $base_series but this PR moves it to $head_series. Add the '$ALLOW_MAJOR_BUMP_LABEL' label to allow this."
                  exit 1
                fi
              else
                echo "Release line unchanged ($base_series); only a patch/pre-release bump."
              fi
              ;;
            *)
              base_major=$(major /tmp/base_pyproject.toml)
              head_major=$(major guppylang/pyproject.toml)
              echo "guppylang major version: base=$base_major head=$head_major"
              if [ "$head_major" -gt "$base_major" ]; then
                if allowed; then
                  echo "Major bump permitted by the '$ALLOW_MAJOR_BUMP_LABEL' label."
                else
                  echo "::error::guppylang major version would bump $base_major → $head_major. Add the '$ALLOW_MAJOR_BUMP_LABEL' label to allow this release."
                  exit 1
                fi
              else
                echo "No major bump detected."
              fi
              ;;
          esac
